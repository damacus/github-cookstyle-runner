---
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Run yaml Lint
        uses: actionshub/yamllint@main

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Run Markdown Lint (markdownlint-cli2)
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: '**/*.md'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and test
        run: |
          docker build -t cookstyle-runner-test -f Dockerfile.test .
          docker run --rm cookstyle-runner-test bash -c "shellspec test/spec"

  publish_beta:
    needs: [yamllint, markdownlint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish to Registry (beta)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: damacus/github-cookstyle-runner
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          tags: "beta"
